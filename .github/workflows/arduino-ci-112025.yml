name: Arduino CI & Firmware Build - 112025 (Blues Opta)

on:
  push:
    branches: [main, master]
    paths:
      - 'TankAlarm-112025-Client-BluesOpta/**'
      - 'TankAlarm-112025-Server-BluesOpta/**'
      - 'TankAlarm-112025-FTPS_Server_Test/**'
      - 'TankAlarm-112025-Viewer-BluesOpta/**'
      - 'TankAlarm-112025-Common/**'
      - '.github/workflows/arduino-ci-112025.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'TankAlarm-112025-Client-BluesOpta/**'
      - 'TankAlarm-112025-Server-BluesOpta/**'
      - 'TankAlarm-112025-FTPS_Server_Test/**'
      - 'TankAlarm-112025-Viewer-BluesOpta/**'
      - 'TankAlarm-112025-Common/**'
      - '.github/workflows/arduino-ci-112025.yml'
  workflow_dispatch:

jobs:
  compile-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Checkout FTPSclientOPTA library
        uses: actions/checkout@v5
        with:
          repository: dorkmo/FTPSclientOPTA
          path: arduino-opta-ftps

      # Temporary bridge: overlay our local 0.3.0 patch on top of the
      # upstream FTPSclientOPTA checkout until dorkmo/FTPSclientOPTA
      # publishes 0.3.0. See:
      #   CODE REVIEW/FTPSCLIENTOPTA_UPSTREAM_CHANGES_06292026.md
      # Remove this step (and the vendor/FTPSclientOPTA-overlay
      # directory) once the public library has
      # FtpsClient::discoverFingerprint(...).
      - name: Overlay local FTPSclientOPTA 0.3.0 patch
        shell: bash
        run: |
          if [ -d vendor/FTPSclientOPTA-overlay ]; then
            cp -fv vendor/FTPSclientOPTA-overlay/library.properties arduino-opta-ftps/library.properties
            cp -fv vendor/FTPSclientOPTA-overlay/src/FtpsClient.h   arduino-opta-ftps/src/FtpsClient.h
            cp -fv vendor/FTPSclientOPTA-overlay/src/FtpsClient.cpp arduino-opta-ftps/src/FtpsClient.cpp
            echo "FTPSclientOPTA overlay applied (vendor/FTPSclientOPTA-overlay)"
          else
            echo "::warning::vendor/FTPSclientOPTA-overlay/ missing; using upstream FTPSclientOPTA as-is"
          fi

      - name: Install Arduino CLI
        shell: bash
        run: |
          ARDUINO_CLI_VERSION="1.4.1"
          mkdir -p "$HOME/bin"
          curl -fsSL "https://downloads.arduino.cc/arduino-cli/arduino-cli_${ARDUINO_CLI_VERSION}_Linux_64bit.tar.gz" | tar -xz -C /tmp
          install -m 0755 /tmp/arduino-cli "$HOME/bin/arduino-cli"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/bin:$PATH"
          arduino-cli version

      - name: Install Arduino Mbed OS Opta Boards core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:mbed_opta

      - name: Install required libraries for 112025
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "Ethernet"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "Blues Wireless Notecard"
          arduino-cli lib install "ArduinoRS485"
          arduino-cli lib install "ArduinoModbus"
          arduino-cli lib install "Arduino_Opta_Blueprint"

      - name: Compile TankAlarm-112025-Client-BluesOpta
        id: compile-112025-client
        continue-on-error: true
        run: |
          arduino-cli compile --fqbn arduino:mbed_opta:opta \
            --build-property "build.extra_flags=-DTANKALARM_DFU_MCUBOOT" \
            --library TankAlarm-112025-Common \
            TankAlarm-112025-Client-BluesOpta/TankAlarm-112025-Client-BluesOpta.ino

      - name: Compile TankAlarm-112025-Server-BluesOpta
        id: compile-112025-server
        continue-on-error: true
        run: |
          LIB_ROOT="$RUNNER_TEMP/arduino-libraries"
          mkdir -p "$LIB_ROOT/FTPSclientOPTA" "$LIB_ROOT/TankAlarm-112025-Common"
          cp -r arduino-opta-ftps/src arduino-opta-ftps/library.properties "$LIB_ROOT/FTPSclientOPTA/"
          cp -r TankAlarm-112025-Common/src TankAlarm-112025-Common/library.properties "$LIB_ROOT/TankAlarm-112025-Common/"

          arduino-cli compile --fqbn arduino:mbed_opta:opta \
            --libraries "$LIB_ROOT" \
            TankAlarm-112025-Server-BluesOpta/TankAlarm-112025-Server-BluesOpta.ino

      - name: Compile TankAlarm-112025-Viewer-BluesOpta
        id: compile-112025-viewer
        continue-on-error: true
        run: |
          arduino-cli compile --fqbn arduino:mbed_opta:opta \
            --library TankAlarm-112025-Common \
            TankAlarm-112025-Viewer-BluesOpta/TankAlarm-112025-Viewer-BluesOpta.ino

      - name: Compile TankAlarm-112025-FTPS_Server_Test
        id: compile-112025-ftps
        continue-on-error: true
        run: |
          LIB_ROOT="$RUNNER_TEMP/arduino-libraries"
          mkdir -p "$LIB_ROOT/FTPSclientOPTA" "$LIB_ROOT/TankAlarm-112025-Common"
          cp -r arduino-opta-ftps/src arduino-opta-ftps/library.properties "$LIB_ROOT/FTPSclientOPTA/"
          cp -r TankAlarm-112025-Common/src TankAlarm-112025-Common/library.properties "$LIB_ROOT/TankAlarm-112025-Common/"

          arduino-cli compile --fqbn arduino:mbed_opta:opta \
            --libraries "$LIB_ROOT" \
            TankAlarm-112025-FTPS_Server_Test/TankAlarm-112025-FTPS_Server_Test.ino

      - name: Create issue on compilation failure
        if: |
          steps.compile-112025-client.outcome == 'failure' ||
          steps.compile-112025-server.outcome == 'failure' ||
          steps.compile-112025-viewer.outcome == 'failure' ||
          steps.compile-112025-ftps.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const date = new Date().toISOString().split('T')[0];

            // Determine which sketch(es) failed
            const client112025Failed = '${{ steps.compile-112025-client.outcome }}' === 'failure';
            const server112025Failed = '${{ steps.compile-112025-server.outcome }}' === 'failure';
            const viewer112025Failed = '${{ steps.compile-112025-viewer.outcome }}' === 'failure';
            const ftps112025Failed = '${{ steps.compile-112025-ftps.outcome }}' === 'failure';

            const failedSketches = [];
            if (client112025Failed) failedSketches.push('TankAlarm-112025-Client-BluesOpta');
            if (server112025Failed) failedSketches.push('TankAlarm-112025-Server-BluesOpta');
            if (viewer112025Failed) failedSketches.push('TankAlarm-112025-Viewer-BluesOpta');
            if (ftps112025Failed) failedSketches.push('TankAlarm-112025-FTPS_Server_Test');

            const sketchName = failedSketches.length === 1 ? failedSketches[0] : 
                               failedSketches.length > 1 ? 'Multiple Sketches (112025)' : 'Unknown';
            const searchPattern = 'Arduino Compilation Error - 112025';

            const issueTitle = `Arduino Compilation Error in ${sketchName} (${date})`;
            const workflowUrl = '${{ github.server_url }}/' +
              '${{ github.repository }}/actions/runs/${{ github.run_id }}';

            let detailsSection = '### Details\n';
            
            // TankAlarm-112025 sketches
            detailsSection += `#### TankAlarm-112025 (Arduino Opta)\n`;
            detailsSection += `- **Client Sketch:** TankAlarm-112025-Client-BluesOpta/` +
              `TankAlarm-112025-Client-BluesOpta.ino ${client112025Failed ? '❌' : '✅'}\n`;
            detailsSection += `- **Server Sketch:** TankAlarm-112025-Server-BluesOpta/` +
              `TankAlarm-112025-Server-BluesOpta.ino ${server112025Failed ? '❌' : '✅'}\n`;
            detailsSection += `- **Viewer Sketch:** TankAlarm-112025-Viewer-BluesOpta/` +
              `TankAlarm-112025-Viewer-BluesOpta.ino ${viewer112025Failed ? '❌' : '✅'}\n`;
            detailsSection += `- **FTPS Test Sketch:** TankAlarm-112025-FTPS_Server_Test/` +
              `TankAlarm-112025-FTPS_Server_Test.ino ${ftps112025Failed ? '❌' : '✅'}\n`;
            
            detailsSection += `\n**Board:**\n`;
            detailsSection += `- Arduino Opta (arduino:mbed_opta:opta)\n`;
            detailsSection += `\n**Triggered by:** ${{ github.event_name }}`;

            const issueBody = `## Arduino Compilation Failed - TankAlarm 112025
            
            The Arduino code compilation failed for the TankAlarm-112025 (Blues Opta) projects.
            
            **Workflow Run:** ${workflowUrl}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            
            ${detailsSection}
            
            ### Next Steps
            1. Review the workflow logs for detailed error messages
            2. Fix compilation errors in the Arduino code
            3. Re-run the workflow to verify the fix
            
            /cc @copilot`;

            // Check if a similar open issue already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['arduino', 'compilation-error'],
              per_page: 10
            });

            const duplicateIssue = existingIssues.data.find(issue =>
              issue.title.includes(searchPattern)
            );

            if (duplicateIssue) {
              // Add a comment to existing issue instead of creating new one
              const commentBody = `Another compilation failure detected:\n\n` +
                `**Workflow Run:** ${workflowUrl}\n` +
                `**Commit:** ${{ github.sha }}\n` +
                `**Branch:** ${{ github.ref_name }}\n\n` +
                detailsSection;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicateIssue.number,
                body: commentBody
              });
              console.log(`Updated existing issue #${duplicateIssue.number}`);
            } else {
              // Create a new issue
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['arduino', 'compilation-error', 'bug', '112025']
              });
              console.log(`Created issue #${issue.data.number}`);
            }

      - name: Fail workflow if compilation failed
        if: |
          steps.compile-112025-client.outcome == 'failure' ||
          steps.compile-112025-server.outcome == 'failure' ||
          steps.compile-112025-viewer.outcome == 'failure' ||
          steps.compile-112025-ftps.outcome == 'failure'
        run: exit 1

  check-version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect FIRMWARE_VERSION change
        id: diff
        shell: bash
        run: |
          VERSION_FILE="TankAlarm-112025-Common/src/TankAlarm_Common.h"
          extract() { grep -E '^#define FIRMWARE_VERSION ' "$1" 2>/dev/null | sed -E 's/.*"([^"]+)".*/\1/'; }

          NEW=$(extract "$VERSION_FILE")
          echo "New FIRMWARE_VERSION: '${NEW}'"

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "No previous commit on this ref (new branch / first push) — treating as a version change."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          OLD=$(git show "${BEFORE}:${VERSION_FILE}" 2>/dev/null | grep -E '^#define FIRMWARE_VERSION ' | sed -E 's/.*"([^"]+)".*/\1/' || true)
          echo "Previous FIRMWARE_VERSION: '${OLD}'"

          if [ "$OLD" != "$NEW" ]; then
            echo "FIRMWARE_VERSION changed ('${OLD}' -> '${NEW}') — firmware binaries will be rebuilt and committed."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "FIRMWARE_VERSION unchanged ('${NEW}') — skipping firmware binary rebuild/commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-firmware:
    needs: [compile-check, check-version]
    if: github.event_name == 'push' && needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: firmware-build-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout FTPSclientOPTA library
        uses: actions/checkout@v5
        with:
          repository: dorkmo/FTPSclientOPTA
          path: arduino-opta-ftps

      # Temporary bridge: overlay our local 0.3.0 patch on top of the
      # upstream FTPSclientOPTA checkout until dorkmo/FTPSclientOPTA
      # publishes 0.3.0. See:
      #   CODE REVIEW/FTPSCLIENTOPTA_UPSTREAM_CHANGES_06292026.md
      # Remove this step (and the vendor/FTPSclientOPTA-overlay
      # directory) once the public library has
      # FtpsClient::discoverFingerprint(...).
      - name: Overlay local FTPSclientOPTA 0.3.0 patch
        shell: bash
        run: |
          if [ -d vendor/FTPSclientOPTA-overlay ]; then
            cp -fv vendor/FTPSclientOPTA-overlay/library.properties arduino-opta-ftps/library.properties
            cp -fv vendor/FTPSclientOPTA-overlay/src/FtpsClient.h   arduino-opta-ftps/src/FtpsClient.h
            cp -fv vendor/FTPSclientOPTA-overlay/src/FtpsClient.cpp arduino-opta-ftps/src/FtpsClient.cpp
            echo "FTPSclientOPTA overlay applied (vendor/FTPSclientOPTA-overlay)"
          else
            echo "::warning::vendor/FTPSclientOPTA-overlay/ missing; using upstream FTPSclientOPTA as-is"
          fi

      - name: Install Arduino CLI
        shell: bash
        run: |
          ARDUINO_CLI_VERSION="1.4.1"
          mkdir -p "$HOME/bin"
          curl -fsSL "https://downloads.arduino.cc/arduino-cli/arduino-cli_${ARDUINO_CLI_VERSION}_Linux_64bit.tar.gz" | tar -xz -C /tmp
          install -m 0755 /tmp/arduino-cli "$HOME/bin/arduino-cli"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/bin:$PATH"
          arduino-cli version

      - name: Install Arduino Mbed OS Opta Boards core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:mbed_opta

      - name: Install required libraries for 112025
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "Ethernet"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "Blues Wireless Notecard"
          arduino-cli lib install "ArduinoRS485"
          arduino-cli lib install "ArduinoModbus"
          arduino-cli lib install "Arduino_Opta_Blueprint"

      - name: Generate config headers from secret
        run: |
          cat > TankAlarm-112025-Client-BluesOpta/ClientConfig.h << EOF
          #ifndef CLIENT_CONFIG_H
          #define CLIENT_CONFIG_H
          #define DEFAULT_PRODUCT_UID "${PRODUCT_UID}"
          #endif // CLIENT_CONFIG_H
          EOF

          cat > TankAlarm-112025-Server-BluesOpta/ServerConfig.h << EOF
          #ifndef SERVER_CONFIG_H
          #define SERVER_CONFIG_H
          #define DEFAULT_SERVER_PRODUCT_UID "${PRODUCT_UID}"
          #endif // SERVER_CONFIG_H
          EOF

          cat > TankAlarm-112025-Viewer-BluesOpta/ViewerConfig.h << EOF
          #ifndef VIEWER_CONFIG_H
          #define VIEWER_CONFIG_H
          #define DEFAULT_VIEWER_PRODUCT_UID "${PRODUCT_UID}"
          #endif // VIEWER_CONFIG_H
          EOF
        env:
          PRODUCT_UID: ${{ secrets.BLUES_PRODUCT_UID }}

      - name: Build client firmware (.bin)
        run: |
          arduino-cli compile --fqbn arduino:mbed_opta:opta \
            --build-property "build.extra_flags=-DTANKALARM_DFU_MCUBOOT" \
            --library TankAlarm-112025-Common \
            --output-dir firmware/112025/client \
            TankAlarm-112025-Client-BluesOpta/TankAlarm-112025-Client-BluesOpta.ino

          # Extract version dynamically
          VERSION=$(grep '^#define FIRMWARE_VERSION ' TankAlarm-112025-Common/src/TankAlarm_Common.h | sed -E 's/.*"([^"]+)".*/\1/')

          # Build the signed/encrypted MCUboot OTA slot image with the Arduino
          # core's "security=sien" (Signature + Encryption) setting. This invokes
          # the core's OWN bundled imgtool (1.8.0-arduino.2) with the canonical
          # flags and the default MCUboot keychain the Opta bootloader actually
          # trusts -- the SAME format proven to validate and swap on hardware.
          # (Replaces the prior build-plain + pip install imgtool + header_size
          # monkeypatch + custom-key sign, which used a different (latest) imgtool
          # and produced a subtly divergent image the bootloader would not swap.)
          arduino-cli compile --fqbn arduino:mbed_opta:opta:security=sien \
            --build-property "build.extra_flags=-DTANKALARM_DFU_MCUBOOT" \
            --build-property "build.version=${VERSION}+0" \
            --library TankAlarm-112025-Common \
            --output-dir build/client-secure \
            TankAlarm-112025-Client-BluesOpta/TankAlarm-112025-Client-BluesOpta.ino
          cp build/client-secure/TankAlarm-112025-Client-BluesOpta.ino.bin \
            firmware/112025/client/TankAlarm-Client-secure-v${VERSION}.slot.bin

      - name: Build server firmware (.bin)
        run: |
          LIB_ROOT="$RUNNER_TEMP/arduino-libraries"
          mkdir -p "$LIB_ROOT/FTPSclientOPTA" "$LIB_ROOT/TankAlarm-112025-Common"
          cp -r arduino-opta-ftps/src arduino-opta-ftps/library.properties "$LIB_ROOT/FTPSclientOPTA/"
          cp -r TankAlarm-112025-Common/src TankAlarm-112025-Common/library.properties "$LIB_ROOT/TankAlarm-112025-Common/"

          arduino-cli compile --fqbn arduino:mbed_opta:opta \
            --libraries "$LIB_ROOT" \
            --output-dir firmware/112025/server \
            TankAlarm-112025-Server-BluesOpta/TankAlarm-112025-Server-BluesOpta.ino

      - name: Build FTPS test firmware (.bin)
        run: |
          LIB_ROOT="$RUNNER_TEMP/arduino-libraries"
          mkdir -p "$LIB_ROOT/FTPSclientOPTA" "$LIB_ROOT/TankAlarm-112025-Common" firmware/112025/ftps-test
          cp -r arduino-opta-ftps/src arduino-opta-ftps/library.properties "$LIB_ROOT/FTPSclientOPTA/"
          cp -r TankAlarm-112025-Common/src TankAlarm-112025-Common/library.properties "$LIB_ROOT/TankAlarm-112025-Common/"

          arduino-cli compile --fqbn arduino:mbed_opta:opta \
            --libraries "$LIB_ROOT" \
            --output-dir firmware/112025/ftps-test \
            TankAlarm-112025-FTPS_Server_Test/TankAlarm-112025-FTPS_Server_Test.ino

      - name: Commit firmware binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain firmware)" ]; then
            git add firmware
            git commit -m "Update Opta firmware binaries"
            # Use the `-X theirs` strategy option to automatically resolve binary conflicts
            # by keeping the version from the commit being rebased (the new build)
            if git pull --rebase -X theirs origin "${GITHUB_REF_NAME}"; then
              git push origin "HEAD:${GITHUB_REF_NAME}"
            else
              echo "Rebase failed. Aborting..."
              git rebase --abort || true
              exit 1
            fi
          else
            echo "No firmware changes to commit."
          fi
