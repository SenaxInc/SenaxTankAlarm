name: Auto-tag on FIRMWARE_VERSION bump

# Watches TankAlarm_Common.h on master. When FIRMWARE_VERSION changes to a
# value that is not yet tagged, creates an annotated tag `v<version>` and
# explicitly dispatches the release-firmware-112025 workflow on that tag.
#
# Why the explicit dispatch step:
#   Pushing a tag with the default GITHUB_TOKEN does NOT trigger downstream
#   `push: tags:` workflows (GitHub's anti-loop protection). The
#   `workflow_dispatch` event IS allowed from GITHUB_TOKEN, so we hand the tag
#   off to release-firmware-112025.yml explicitly. The release workflow runs
#   in the tag's ref context, so its `if: startsWith(github.ref, 'refs/tags/')`
#   gates still pass and a proper GitHub Release is published.

on:
  push:
    branches: [master, main]
    paths:
      - 'TankAlarm-112025-Common/src/TankAlarm_Common.h'
  workflow_dispatch:

permissions:
  contents: write   # push the annotated tag
  actions: write    # dispatch the release workflow

concurrency:
  group: auto-tag-on-version-bump
  cancel-in-progress: false

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # need full history so the tag we push is reachable

      - name: Read FIRMWARE_VERSION from header
        id: version
        shell: bash
        run: |
          HEADER="TankAlarm-112025-Common/src/TankAlarm_Common.h"
          VERSION=$(grep '^#define FIRMWARE_VERSION ' "$HEADER" | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not parse FIRMWARE_VERSION from $HEADER" >&2
            exit 1
          fi
          TAG="v$VERSION"
          echo "Detected $TAG"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check whether tag already exists
        id: tagcheck
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # `fetch-depth: 0` pulls all tags; double-check origin in case a
          # tag was pushed to the remote between fetch and check.
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists locally — nothing to do"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin — nothing to do"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG does not exist yet — will create"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push annotated tag
        if: steps.tagcheck.outputs.exists == 'false'
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          COMMIT_SUBJECT=$(git log -1 --pretty=%s)
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" \
            -m "$TAG (auto-tagged on FIRMWARE_VERSION bump)" \
            -m "Triggering commit: $COMMIT_SUBJECT" \
            -m "Release artifacts are produced by release-firmware-112025.yml."
          git push origin "$TAG"
          echo "Pushed $TAG"

      - name: Dispatch release workflow on the new tag
        if: steps.tagcheck.outputs.exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # GITHUB_TOKEN tag pushes don't fire push-trigger workflows, but
          # workflow_dispatch is allowed. Running on --ref <tag> makes
          # github.ref = refs/tags/<tag>, so the release workflow's
          # `if: startsWith(github.ref, 'refs/tags/')` gates still pass.
          gh workflow run release-firmware-112025.yml --ref "$TAG"
          echo "Dispatched release-firmware-112025.yml on $TAG"

      - name: Summary
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if [ "${{ steps.tagcheck.outputs.exists }}" = "true" ]; then
            echo "::notice title=Skipped::$TAG already exists; no action taken."
          else
            echo "::notice title=Released::Tagged $TAG and dispatched the release workflow."
          fi
