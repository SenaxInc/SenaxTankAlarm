name: Release TankAlarm Firmware (112025)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout FTPSclientOPTA library
        uses: actions/checkout@v5
        with:
          repository: dorkmo/FTPSclientOPTA
          path: arduino-opta-ftps

      - name: Read firmware version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^#define FIRMWARE_VERSION ' TankAlarm-112025-Common/src/TankAlarm_Common.h | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches firmware version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag version $TAG_VERSION does not match firmware version ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Install Arduino CLI
        shell: bash
        run: |
          ARDUINO_CLI_VERSION="1.4.1"
          mkdir -p "$HOME/bin"
          curl -fsSL "https://downloads.arduino.cc/arduino-cli/arduino-cli_${ARDUINO_CLI_VERSION}_Linux_64bit.tar.gz" | tar -xz -C /tmp
          install -m 0755 /tmp/arduino-cli "$HOME/bin/arduino-cli"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/bin:$PATH"
          arduino-cli version

      - name: Install Arduino Mbed OS Opta Boards core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:mbed_opta

      - name: Install required libraries for 112025
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "Ethernet"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "Blues Wireless Notecard"
          arduino-cli lib install "ArduinoRS485"
          arduino-cli lib install "ArduinoModbus"

      - name: Generate config headers from secret
        run: |
          cat > TankAlarm-112025-Client-BluesOpta/ClientConfig.h << EOF
          #ifndef CLIENT_CONFIG_H
          #define CLIENT_CONFIG_H
          #define DEFAULT_PRODUCT_UID "${PRODUCT_UID}"
          #endif // CLIENT_CONFIG_H
          EOF

          cat > TankAlarm-112025-Server-BluesOpta/ServerConfig.h << EOF
          #ifndef SERVER_CONFIG_H
          #define SERVER_CONFIG_H
          #define DEFAULT_SERVER_PRODUCT_UID "${PRODUCT_UID}"
          #endif // SERVER_CONFIG_H
          EOF

          cat > TankAlarm-112025-Viewer-BluesOpta/ViewerConfig.h << EOF
          #ifndef VIEWER_CONFIG_H
          #define VIEWER_CONFIG_H
          #define DEFAULT_VIEWER_PRODUCT_UID "${PRODUCT_UID}"
          #endif // VIEWER_CONFIG_H
          EOF
        env:
          PRODUCT_UID: ${{ secrets.BLUES_PRODUCT_UID }}

      - name: Prepare Arduino libraries
        shell: bash
        run: |
          LIB_ROOT="$RUNNER_TEMP/arduino-libraries"
          mkdir -p "$LIB_ROOT/FTPSclientOPTA" "$LIB_ROOT/TankAlarm-112025-Common"
          cp -r arduino-opta-ftps/src arduino-opta-ftps/library.properties "$LIB_ROOT/FTPSclientOPTA/"
          cp -r TankAlarm-112025-Common/src TankAlarm-112025-Common/library.properties "$LIB_ROOT/TankAlarm-112025-Common/"
          echo "LIB_ROOT=$LIB_ROOT" >> "$GITHUB_ENV"

      - name: Build client firmware
        shell: bash
        run: |
          mkdir -p build/client
          arduino-cli compile --fqbn arduino:mbed_opta:opta \
            --build-property "build.extra_flags=-DTANKALARM_DFU_MCUBOOT" \
            --libraries "$LIB_ROOT" \
            --output-dir build/client \
            TankAlarm-112025-Client-BluesOpta/TankAlarm-112025-Client-BluesOpta.ino

          BIN_SOURCE=$(find build/client -maxdepth 1 -name '*.bin' ! -name '*.with_bootloader.bin' ! -name '*.bootloader.bin' | head -n1)
          test -n "$BIN_SOURCE"
          cp "$BIN_SOURCE" "TankAlarm-Client-v${{ steps.version.outputs.version }}.bin"

      - name: Build server firmware
        shell: bash
        run: |
          mkdir -p build/server
          arduino-cli compile --fqbn arduino:mbed_opta:opta \
            --libraries "$LIB_ROOT" \
            --output-dir build/server \
            TankAlarm-112025-Server-BluesOpta/TankAlarm-112025-Server-BluesOpta.ino

          BIN_SOURCE=$(find build/server -maxdepth 1 -name '*.bin' ! -name '*.with_bootloader.bin' ! -name '*.bootloader.bin' | head -n1)
          test -n "$BIN_SOURCE"
          cp "$BIN_SOURCE" "TankAlarm-Server-v${{ steps.version.outputs.version }}.bin"

      - name: Build viewer firmware
        shell: bash
        run: |
          mkdir -p build/viewer
          arduino-cli compile --fqbn arduino:mbed_opta:opta \
            --libraries "$LIB_ROOT" \
            --output-dir build/viewer \
            TankAlarm-112025-Viewer-BluesOpta/TankAlarm-112025-Viewer-BluesOpta.ino

          BIN_SOURCE=$(find build/viewer -maxdepth 1 -name '*.bin' ! -name '*.with_bootloader.bin' ! -name '*.bootloader.bin' | head -n1)
          test -n "$BIN_SOURCE"
          cp "$BIN_SOURCE" "TankAlarm-Viewer-v${{ steps.version.outputs.version }}.bin"

      - name: Install imgtool
        run: |
          pip install imgtool
          python -c "import imgtool.image; f=imgtool.image.__file__; s=open(f).read().replace('self.header_size,', 'self.header_size & 0xFFFF,'); open(f, 'w').write(s)"

      - name: Sign & Format MCUboot Image (Client only)
        shell: bash
        run: |
          # Only the Client supports MCUboot OTA. Server and Viewer are updated
          # locally over USB with their raw .bin, so they are not signed here.
          imgtool sign \
            --key mcuboot_keys/ecdsa-p256-signing-priv-key.pem \
            --encrypt mcuboot_keys/ecdsa-p256-encrypt-pub-key.pem \
            --align 32 \
            --max-align 32 \
            --version "${{ steps.version.outputs.version }}+0" \
            --header-size 0x20000 \
            --pad-header \
            --slot-size 0x1E0000 \
            "TankAlarm-Client-v${{ steps.version.outputs.version }}.bin" \
            "TankAlarm-Client-secure-v${{ steps.version.outputs.version }}.slot.bin"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          name: TankAlarm Beta v${{ steps.version.outputs.version }}
          files: |
            TankAlarm-Client-v${{ steps.version.outputs.version }}.bin
            TankAlarm-Server-v${{ steps.version.outputs.version }}.bin
            TankAlarm-Viewer-v${{ steps.version.outputs.version }}.bin
            TankAlarm-Client-secure-v${{ steps.version.outputs.version }}.slot.bin
          generate_release_notes: true